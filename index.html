<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>판교 점심 뽑기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f3;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .container {
    background: #fff;
    border-radius: 16px;
    padding: 2.5rem 2rem;
    max-width: 440px;
    width: 100%;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    text-align: center;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    color: #111;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 2rem;
  }
  .result-card {
    background: #fafaf8;
    border: 1px solid #e8e8e5;
    border-radius: 14px;
    padding: 2rem 1.5rem;
    min-height: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 1.25rem;
  }
  .placeholder { color: #aaa; font-size: 15px; }
  .result-name { font-size: 30px; font-weight: 700; color: #111; }
  .badges { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .badge {
    font-size: 12px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .badge-genre { background: #EEEDFE; color: #3C3489; }
  .badge-loc { background: #E1F5EE; color: #085041; }
  .result-desc { font-size: 14px; color: #666; }
  .btn-pick {
    width: 100%;
    background: #185FA5;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 17px;
    font-weight: 600;
    padding: 15px;
    cursor: pointer;
    transition: background .15s, transform .1s;
    margin-bottom: 1.5rem;
  }
  .btn-pick:hover { background: #1450880; }
  .btn-pick:active { transform: scale(0.98); }
  .btn-pick:disabled { background: #b0c4d8; cursor: default; }
  .history { text-align: left; }
  .history-title {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .history-list { list-style: none; }
  .history-list li {
    font-size: 13px;
    color: #555;
    padding: 7px 0;
    border-bottom: 1px solid #f0f0ee;
    display: flex;
    justify-content: space-between;
  }
  .history-list li:last-child { border-bottom: none; }
  .history-time { color: #bbb; font-size: 12px; }
  .spin {
    display: inline-block;
    font-size: 28px;
    animation: spin .5s linear infinite;
  }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .count { font-size: 12px; color: #aaa; margin-bottom: 1.5rem; }
</style>
</head>
<body>
<div class="container">
  <h1>판교 점심 뽑기</h1>
  <p class="subtitle">판교로 331 기준 도보 5분 내 맛집</p>

  <div class="result-card" id="card">
    <span class="placeholder">버튼을 눌러 오늘 점심을 골라보세요</span>
  </div>

  <p class="count" id="count"></p>

  <button class="btn-pick" id="btn" onclick="pick()">오늘 점심 뽑기</button>

  <div class="history" id="historyWrap" style="display:none;">
    <p class="history-title">오늘 뽑은 기록</p>
    <ul class="history-list" id="historyList"></ul>
  </div>
</div>

<script>
const restaurants = [
  {name:"도담",genre:"한식",loc:"바로 앞",desc:"갈비탕 맛집"},
  {name:"네코부루",genre:"일식",loc:"바로 앞",desc:"돈까스 맛집"},
  {name:"클준빛날영",genre:"일식",loc:"삼환하이펙스 지하",desc:"라멘집"},
  {name:"백소정",genre:"일식",loc:"삼환하이펙스 1층",desc:"돈까스·우동 등"},
  {name:"미쁜선순대",genre:"한식",loc:"삼환하이펙스 1층",desc:"순대국"},
  {name:"탄탄면공방",genre:"일식",loc:"삼환하이펙스 1층",desc:"탄탄면"},
  {name:"호랭이곳간",genre:"한식",loc:"삼환하이펙스 지하",desc:"비빔밥"},
  {name:"고다이주방",genre:"일식",loc:"삼환하이펙스 지하",desc:"돈까스·소바"},
  {name:"밥볶다",genre:"한식",loc:"삼환하이펙스 지하",desc:"고기·볶음밥"},
  {name:"북청집",genre:"한식",loc:"삼환하이펙스 A동 지하",desc:"점심 불백"},
  {name:"보배반점",genre:"중식",loc:"삼환하이펙스 1층",desc:"중국집"},
  {name:"삼군김치찌개",genre:"한식",loc:"삼환하이펙스 A동 지하",desc:"김치찌개"},
  {name:"이태리부대찌개",genre:"한식",loc:"삼환하이펙스 A동 지하",desc:"부대찌개"},
  {name:"양촌리돈까스",genre:"한식",loc:"삼환하이펙스 A동 지하",desc:"돈까스"},
  {name:"계란집",genre:"한식",loc:"삼환하이펙스 A동 지하",desc:"오므라이스"},
  {name:"코이라멘",genre:"일식",loc:"삼환하이펙스 A동 지하",desc:"라멘·마제소바"},
  {name:"수국정",genre:"한식",loc:"삼환하이펙스 지하",desc:"한우국밥"},
  {name:"삼미칼국수",genre:"한식",loc:"삼환하이펙스 지하",desc:"칼국수 맛집"},
  {name:"김치도가",genre:"한식",loc:"삼환하이펙스 지하",desc:"김치찌개"},
  {name:"하동곰탕북엇국",genre:"한식",loc:"삼환하이펙스 A동 지하",desc:"북어국·한식"},
  {name:"일미집",genre:"한식",loc:"H스퀘어",desc:"감자탕"},
  {name:"차엔",genre:"중식",loc:"H스퀘어",desc:"짬뽕"},
  {name:"비즐돈까스",genre:"일식",loc:"H스퀘어",desc:"돈까스 맛집"},
  {name:"헤비스테이크",genre:"양식",loc:"H스퀘어",desc:"스테이크"},
  {name:"제주은희네해장국",genre:"한식",loc:"H스퀘어",desc:"해장국"},
  {name:"이소정카츠",genre:"일식",loc:"H스퀘어",desc:"돈까스"},
  {name:"규카츠정",genre:"일식",loc:"H스퀘어",desc:"규카츠 맛집"},
  {name:"춘업순댓국",genre:"한식",loc:"H스퀘어",desc:"순대국 맛집"},
  {name:"프레퍼스다이어트푸드",genre:"양식",loc:"H스퀘어",desc:"샐러드"},
  {name:"본우리반상",genre:"한식",loc:"H스퀘어",desc:"솥밥 한식"},
  {name:"홍호아",genre:"베트남",loc:"H스퀘어",desc:"반미·쌀국수"},
  {name:"오한수우육면가",genre:"홍콩식",loc:"H스퀘어",desc:"우육면"},
  {name:"국밥공방",genre:"한식",loc:"H스퀘어",desc:"국밥·냉면류"},
  {name:"토속상황삼계탕",genre:"한식",loc:"유스페이스2 2층",desc:"삼계탕"},
  {name:"조재벌식당",genre:"한식",loc:"유스페이스2 2층",desc:"부대찌개"},
  {name:"오투닭갈비",genre:"한식",loc:"유스페이스2 2층",desc:"닭갈비 맛집"},
  {name:"봉추찜닭",genre:"한식",loc:"유스페이스2 2층",desc:"찜닭"},
  {name:"르메콩",genre:"베트남",loc:"유스페이스2 2층",desc:"쌀국수"},
  {name:"판교면학",genre:"일식",loc:"유스페이스A",desc:"라멘"},
  {name:"소바니우동",genre:"일식",loc:"유스페이스1",desc:"카레우동 맛집"},
  {name:"더피크닉",genre:"한식",loc:"유스페이스1",desc:"오므라이스 맛집"},
  {name:"국수의진수",genre:"한식",loc:"유스페이스1",desc:"국수집, 여름 메뉴 굿"},
];

const today = new Date().toDateString();
const key = 'pangyo_' + today;
let history = [];
try { history = JSON.parse(localStorage.getItem(key) || '[]'); } catch(e){}
updateCount();
if(history.length) renderHistory();

function pick(){
  const btn = document.getElementById('btn');
  const card = document.getElementById('card');
  btn.disabled = true;
  card.innerHTML = '<span class="spin">&#8635;</span>';

  setTimeout(()=>{
    const used = history.map(h => h.name);
    const available = restaurants.filter(r => !used.includes(r.name));
    const pool = available.length > 0 ? available : restaurants;
    const r = pool[Math.floor(Math.random() * pool.length)];

    card.innerHTML = `
      <div class="result-name">${r.name}</div>
      <div class="badges">
        <span class="badge badge-genre">${r.genre}</span>
        <span class="badge badge-loc">${r.loc}</span>
      </div>
      <div class="result-desc">${r.desc}</div>
    `;

    const t = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    history.unshift({name: r.name, time: t});
    try { localStorage.setItem(key, JSON.stringify(history)); } catch(e){}
    updateCount();
    renderHistory();
    btn.disabled = false;
  }, 600);
}

function updateCount(){
  const used = history.length;
  const total = restaurants.length;
  const el = document.getElementById('count');
  if(used > 0) el.textContent = `오늘 ${used}곳 뽑음 · 남은 곳 ${Math.max(0, total - used)}곳`;
}

function renderHistory(){
  const wrap = document.getElementById('historyWrap');
  const list = document.getElementById('historyList');
  if(!history.length){ wrap.style.display='none'; return; }
  wrap.style.display = 'block';
  list.innerHTML = history.slice(0,5).map(h =>
    `<li><span>${h.name}</span><span class="history-time">${h.time}</span></li>`
  ).join('');
}
</script>
</body>
</html>
